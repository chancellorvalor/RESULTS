<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>APRP Election Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="admin-shell">
    <header class="topbar">
      <div>
        <p class="kicker">APRP ADMIN</p>
        <h1>Live Election Control</h1>
        <p>Enter turnout, reporting, vote percentages, and calls.</p>
      </div>
      <div class="actions">
        <button id="save-election">Save Election Settings</button>
        <button id="refresh-data">Refresh</button>
      </div>
    </header>

    <section id="error-box" class="error-box hidden"></section>

    <section class="card election-card">
      <h2>Election Settings</h2>
      <div class="grid">
        <label>
          Election Title
          <input id="election-title" />
        </label>
        <label>
          Subtitle
          <input id="election-subtitle" />
        </label>
        <label>
          Win Threshold
          <input id="win-threshold" type="number" />
        </label>
        <label>
          Total Electoral Votes
          <input id="total-electoral-votes" type="number" />
        </label>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <div>
          <h2>State Inputs</h2>
          <p>Total turnout is the full expected/possible turnout. Turnout % is how much has reported so far.</p>
        </div>
        <input id="state-search" placeholder="Search state..." />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>State</th>
              <th>EV</th>
              <th>Total Turnout</th>
              <th>Turnout %</th>
              <th>GOP %</th>
              <th>DNC %</th>
              <th>IND %</th>
              <th>Called</th>
              <th>Save</th>
            </tr>
          </thead>
          <tbody id="state-rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../shared/config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
